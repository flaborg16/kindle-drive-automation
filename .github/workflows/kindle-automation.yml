name: Kindle Drive Automation

on:
  workflow_dispatch:
  schedule:
    # Test mode: every 5 minutes, away from the top of the hour
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

jobs:
  run-kindle-automation:
    runs-on: ubuntu-latest

    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
      KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
      KINDLE_ROOT_FOLDER_NAME: Kindle_Automation
      PROCESS_NOTES_AS_QUOTES: "false"
      MAX_EMAIL_ATTACHMENT_MB: "24"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system converters
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice pandoc calibre

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google service account file
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json

      - name: Run automation
        env:
          GOOGLE_SERVICE_ACCOUNT_FILE: service_account.json
          PYTHONPATH: src
        run: |
          python -m kindle_drive_automation.main