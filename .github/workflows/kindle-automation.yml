name: Kindle Drive Automation

on:
  workflow_dispatch:
  schedule:
    # Every 15 minutes. Reduce this if you use a private repo and want to save Actions minutes.
    - cron: "*/15 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system converters
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            libreoffice \
            calibre \
            fonts-dejavu-core \
            fonts-liberation

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automation
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          KINDLE_ROOT_FOLDER_NAME: Kindle_Automation
          BOOKS_FOLDER_NAME: Books_To_Kindle
          NOTEBOOKS_FOLDER_NAME: Notebooks
          SENT_FOLDER_NAME: Sent_To_Kindle
          PROCESSED_NOTEBOOKS_FOLDER_NAME: Processed_Notebooks
          FAILED_FOLDER_NAME: Failed
          QUOTATIONS_FOLDER_NAME: Quotations
          MAX_EMAIL_ATTACHMENT_MB: "24"
          PROCESS_NOTES_AS_QUOTES: "false"
        run: |
          PYTHONPATH=src python -m kindle_drive_automation.main
